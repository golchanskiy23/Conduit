server:
  address: ":8080"
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 15s
  shutdown_timeout: 1m

ttlmap:
  expired_time: 20s

# extended section
pools:
  - worker: "payment"
    workers_num: 8
    buffer_size: 32
    job_timeout: 5s
  - worker: "email"
    workers_num: 4
    buffer_size: 16
    job_timeout: 10s
  - worker: "report"
    workers_num: 2
    buffer_size: 4
    job_timeout: 5m
  - worker: "default"
    workers_num: 4
    buffer_size: 16
    job_timeout: 30s